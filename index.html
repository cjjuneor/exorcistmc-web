<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXORCISTMC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(to bottom,#081423,#050505);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.container{
width:100%;
max-width:700px;
text-align:center;
padding:40px;
}

.logo{
width:180px;
margin-bottom:20px;
filter:drop-shadow(0 0 15px #00d4ff);
}

h1{
font-size:64px;
color:#00d4ff;
margin-bottom:10px;
text-shadow:0 0 20px #00d4ff;
}

.subtitle{
font-size:22px;
color:#9ddfff;
margin-bottom:10px;
}

.desc{
color:#cfcfcf;
margin-bottom:50px;
}

.server-box{
background:rgba(255,255,255,0.03);
border:1px solid rgba(0,212,255,.4);
border-radius:15px;
padding:25px;
backdrop-filter:blur(10px);
}

.server-box h2{
margin-bottom:20px;
color:#00d4ff;
}

.server{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.server:last-child{
border:none;
}

.server-info{
text-align:left;
}

.server-type{
font-size:14px;
color:#9ddfff;
}

.ip{
font-size:28px;
font-weight:bold;
}

.port{
margin-top:5px;
color:#aaa;
}

.copy-btn{
background:transparent;
border:2px solid #00d4ff;
color:#00d4ff;
padding:15px 30px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.copy-btn:hover{
background:#00d4ff;
color:black;
}

.links{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.link-btn{
background:#00d4ff;
color:black;
text-decoration:none;
padding:18px 40px;
border-radius:12px;
font-weight:bold;
transition:.3s;
}

.link-btn:hover{
transform:translateY(-3px);
}

.footer{
margin-top:35px;
color:#777;
font-size:14px;
}

.particle{
position:fixed;
width:3px;
height:3px;
background:#00d4ff;
border-radius:50%;
opacity:.5;
}

</style>
</head>

<body>

<div class="container">

<!-- CAMBIA logo.png POR TU LOGO -->
<img src="73571f8f-6486-40a5-9f99-aabf55ca83a5.png" class="logo">

<h1>EXORCISTMC</h1>

<div class="subtitle">
Survival Java & Bedrock
</div>

<div class="desc">
Donde el poder rompe las maldiciones
</div>

<div class="server-box">

<h2>Conecta al Servidor</h2>

<div class="server">

<div class="server-info">
<div class="server-type">Edición Java</div>
<div class="ip">exorcistmc.holy.gg</div>
</div>

<button class="copy-btn"
onclick="copyJava()">
Copiar IP
</button>

</div>

<div class="server">

<div class="server-info">
<div class="server-type">Edición Bedrock</div>
<div class="ip">ut02.holy.gg</div>
<div class="port">Puerto: 19564</div>
</div>

<button class="copy-btn"
onclick="copyBedrock()">
Copiar IP
</button>

</div>

</div>

<div class="links">

<a href="#" class="link-btn">
Discord
</a>

<a href="#" class="link-btn">
Tienda
</a>

</div>

<div class="footer">
© 2026 EXORCISTMC
</div>

</div>

<script>

function copyJava(){
navigator.clipboard.writeText("exorcistmc.holy.gg");
alert("IP Java copiada");
}

function copyBedrock(){
navigator.clipboard.writeText("ut02.holy.gg");
alert("IP Bedrock copiada");
}

for(let i=0;i<40;i++){
let p=document.createElement("div");
p.classList.add("particle");
p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";
document.body.appendChild(p);
}

</script>

</body>
</html>
