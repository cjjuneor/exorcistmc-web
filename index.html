<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXORCISTMC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#081423 0%,#050505 100%);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
width:90%;
max-width:900px;
}

.logo{
width:220px;
margin-bottom:15px;
filter:drop-shadow(0 0 25px #00d4ff);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

h1{
font-size:70px;
color:#00d4ff;
text-shadow:0 0 25px #00d4ff;
margin-bottom:10px;
}

.subtitle{
font-size:24px;
color:#b8e8ff;
margin-bottom:8px;
}

.description{
color:#d0d0d0;
margin-bottom:40px;
font-size:18px;
}

.server-box{
background:rgba(255,255,255,0.03);
border:1px solid rgba(0,212,255,.3);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(0,212,255,.1);
}

.server{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.server:last-child{
border-bottom:none;
}

.server-info{
text-align:left;
}

.server-title{
font-size:15px;
color:#9cdfff;
}

.server-ip{
font-size:30px;
font-weight:bold;
}

.port{
margin-top:5px;
color:#aaa;
}

.copy-btn{
background:#00d4ff;
color:black;
border:none;
padding:14px 24px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.copy-btn:hover{
transform:scale(1.05);
}

.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.main-btn{
background:#00d4ff;
color:black;
padding:15px 35px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.main-btn:hover{
transform:translateY(-3px);
}

.footer{
margin-top:30px;
color:#777;
font-size:14px;
}

.particle{
position:absolute;
background:#00d4ff;
border-radius:50%;
opacity:.3;
pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<!-- CAMBIA logo.png POR EL NOMBRE REAL DE TU LOGO -->
<img src="logo.png" class="logo">

<h1>EXORCISTMC</h1>

<div class="subtitle">
Survival Java & Bedrock
</div>

<div class="description">
Donde el poder rompe las maldiciones
</div>

<div class="server-box">

<div class="server">

<div class="server-info">
<div class="server-title">JAVA EDITION</div>
<div class="server-ip">exorcistmc.holy.gg</div>
</div>

<button class="copy-btn" onclick="copyJava()">
Copiar IP
</button>

</div>

<div class="server">

<div class="server-info">
<div class="server-title">BEDROCK EDITION</div>
<div class="server-ip">ut02.holy.gg</div>
<div class="port">Puerto: 19564</div>
</div>

<button class="copy-btn" onclick="copyBedrock()">
Copiar IP
</button>

</div>

</div>

<div class="buttons">

<a class="main-btn"
href="https://discord.gg/UvQWpeDnVv"
target="_blank">
Discord
</a>

<a class="main-btn"
href="#"
target="_blank">
Tienda
</a>

</div>

<div class="footer">
© 2026 EXORCISTMC
</div>

</div>

<script>

function copyJava(){
navigator.clipboard.writeText("exorcistmc.holy.gg");
alert("IP Java copiada");
}

function copyBedrock(){
navigator.clipboard.writeText("ut02.holy.gg:19564");
alert("IP Bedrock copiada");
}

for(let i=0;i<35;i++){
let p=document.createElement("div");
p.classList.add("particle");

let size=Math.random()*4+2;

p.style.width=size+"px";
p.style.height=size+"px";

p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";

document.body.appendChild(p);
}

</script>

</body>
</html>
