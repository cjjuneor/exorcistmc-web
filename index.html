<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXORCISTMC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(to bottom,#071426,#050505);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(0,212,255,.15), transparent 25%),
radial-gradient(circle at 80% 70%, rgba(0,212,255,.1), transparent 25%);
pointer-events:none;
}

.logo{
width:220px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px #00d4ff);
}

h1{
font-size:70px;
color:#00d4ff;
text-shadow:0 0 20px #00d4ff;
margin-bottom:10px;
}

.sub{
font-size:22px;
color:#cfcfcf;
margin-bottom:10px;
}

.frase{
font-size:18px;
color:#8ccfff;
margin-bottom:40px;
}

.server-box{
width:700px;
max-width:90%;
background:rgba(255,255,255,.03);
border:2px solid #00d4ff;
border-radius:15px;
padding:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,212,255,.2);
}

.server-box h2{
text-align:center;
margin-bottom:25px;
color:#00d4ff;
}

.ip-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

.ip-row:last-child{
border:none;
}

.ip-info h3{
color:#00d4ff;
margin-bottom:5px;
}

.ip{
font-size:28px;
font-weight:bold;
}

button{
background:#00d4ff;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.links{
margin-top:35px;
display:flex;
gap:20px;
}

.link-btn{
background:#00d4ff;
color:black;
text-decoration:none;
padding:18px 35px;
border-radius:12px;
font-weight:bold;
font-size:20px;
transition:.3s;
}

.link-btn:hover{
transform:translateY(-3px);
}

.footer{
margin-top:50px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<!-- CAMBIA ESTA IMAGEN POR TU LOGO -->
<img src="https://via.placeholder.com/220" class="logo">

<h1>EXORCISTMC</h1>

<div class="sub">
Survival Java & Bedrock
</div>

<div class="frase">
Donde el poder rompe las maldiciones
</div>

<div class="server-box">

<h2>Conecta al Servidor</h2>

<div class="ip-row">

<div class="ip-info">
<h3>Edición Java</h3>
<div class="ip">exorcistmc.holy.gg</div>
</div>

<button onclick="copiarJava()">
Copiar IP
</button>

</div>

<div class="ip-row">

<div class="ip-info">
<h3>Edición Bedrock</h3>
<div class="ip">ut02.holy.gg</div>
<div>Puerto: 19564</div>
</div>

<button onclick="copiarBedrock()">
Copiar IP
</button>

</div>

</div>

<div class="links">

<a href="#" class="link-btn">
Discord
</a>

<a href="#" class="link-btn">
Tienda
</a>

</div>

<div class="footer">
© 2026 EXORCISTMC
</div>

<script>

function copiarJava(){
navigator.clipboard.writeText("exorcistmc.holy.gg");
alert("IP Java copiada");
}

function copiarBedrock(){
navigator.clipboard.writeText("ut02.holy.gg");
alert("IP Bedrock copiada");
}

</script>

</body>
</html>
