<script>

function toast(msg){
const t=document.getElementById("toast");
t.textContent=msg;
t.style.opacity="1";

setTimeout(()=>{
t.style.opacity="0";
},2000);
}

function copyJava(){
navigator.clipboard.writeText("exorcistmc.holy.gg");
toast("IP Java copiada");
}

function copyBedrock(){
navigator.clipboard.writeText("ut02.holy.gg:19564");
toast("IP Bedrock copiada");
}

fetch("https://api.mcsrvstat.us/2/exorcistmc.holy.gg")
.then(res=>res.json())
.then(data=>{

const box=document.getElementById("server-status");

if(data.online){

box.innerHTML=`
🟢 ONLINE<br>
👥 ${data.players.online} / ${data.players.max} jugadores
`;

}else{

box.innerHTML="🔴 OFFLINE";

}

})
.catch(()=>{
document.getElementById("server-status").innerHTML=
"⚠ Error al cargar estado";
});

</script>
