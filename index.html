<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXORCISTMC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(to bottom,#081423,#050505);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:900px;
text-align:center;
padding:40px;
}

.logo{
width:220px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px #00d4ff);
}

h1{
font-size:70px;
color:#00d4ff;
text-shadow:0 0 20px #00d4ff;
margin-bottom:10px;
}

.subtitle{
font-size:22px;
color:#b8e8ff;
margin-bottom:10px;
}

.description{
color:#d0d0d0;
margin-bottom:40px;
}

.server-box{
background:rgba(255,255,255,.03);
border:1px solid rgba(0,212,255,.3);
border-radius:20px;
padding:30px;
backdrop-filter:blur(10px);
}

.server{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.server:last-child{
border-bottom:none;
}

.server-info{
text-align:left;
}

.server-title{
font-size:15px;
color:#9ddfff;
}

.server-ip{
font-size:28px;
font-weight:bold;
}

.port{
margin-top:5px;
color:#aaa;
}

.copy-btn{
background:#00d4ff;
color:black;
border:none;
padding:12px 24px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.main-btn{
background:#00d4ff;
color:black;
padding:15px 35px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.main-btn:hover{
transform:translateY(-3px);
}

.footer{
margin-top:30px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>EXORCISTMC</h1>

<div class="subtitle">
Survival Java & Bedrock
</div>

<div class="description">
Donde el poder rompe las maldiciones
</div>

<div class="server-box">

<div class="server">

<div class="server-info">
<div class="server-title">JAVA EDITION</div>
<div class="server-ip">exorcistmc.holy.gg</div>
</div>

<button class="copy-btn" onclick="copyJava()">
Copiar IP
</button>

</div>

<div class="server">

<div class="server-info">
<div class="server-title">BEDROCK EDITION</div>
<div class="server-ip">ut02.holy.gg</div>
<div class="port">Puerto: 19564</div>
</div>

<button class="copy-btn" onclick="copyBedrock()">
Copiar IP
</button>

</div>

</div>

<div class="buttons">

<a class="main-btn"
href="https://discord.gg/UvQWpeDnVv"
target="_blank">
Discord
</a>

<a class="main-btn"
href="tienda.html">
Tienda
</a>

</div>

<div class="footer">
© 2026 EXORCISTMC
</div>

</div>

<script>

function copyJava(){
navigator.clipboard.writeText("exorcistmc.holy.gg");
alert("IP Java copiada");
}

function copyBedrock(){
navigator.clipboard.writeText("ut02.holy.gg:19564");
alert("IP Bedrock copiada");
}

</script>

</body>
</html>
